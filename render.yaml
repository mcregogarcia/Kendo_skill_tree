databases:
  - name: kendo-skill-tree-db
    plan: free
    databaseName: kendo_skill_tree

services:
  - type: web
    name: kendo-skill-tree
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        fromDatabase:
          name: kendo-skill-tree-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_REDIRECT_URI
        sync: false
      - key: ADMIN_DISCORD_IDS
        sync: false
